# HTTP Configuration
quarkus.http.port=8081

# CORS Configuration
# Unica fonte de verdade para CORS - CorsFilter.java removido.
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8090,http://localhost,http://localhost:80,http://localhost:8083
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# PocketBase Configuration
pocketbase.url=http://localhost:8090
%prod.pocketbase.url=http://pocketbase:8090
pocketbase.api.url=${pocketbase.url}/api
quarkus.rest-client."br.com.javaflix.client.PocketBaseClient".url=${pocketbase.api.url}

# JWT Configuration
# Tokens emitidos e verificados pelo PocketBase.
# smallrye.jwt.sign.key.location removido - app nao emite tokens proprios.
mp.jwt.verify.publickey.location=${pocketbase.url}/api/collections/users/auth-methods
mp.jwt.verify.issuer=${pocketbase.url}

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.com.javaflix".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Dev Services
quarkus.devservices.enabled=false

# Thread Pool Configuration
# Aumentado para suportar pico de 1.000 usuários simultâneos.
# core=50 threads sempre ativas; max=200 sob pico; fila=2000 tasks pendentes.
javaflix.threadpool.core-size=50
javaflix.threadpool.max-size=200
javaflix.threadpool.queue-capacity=2000

# Performance Metrics (Micrometer/Prometheus - /q/metrics)
javaflix.metrics.slow-query-threshold-ms=500

# Cache (Redis)
quarkus.cache.type=redis
quarkus.redis.hosts=redis://localhost:6379
%prod.quarkus.redis.hosts=redis://redis:6379
quarkus.cache.redis.conteudo-cache.expire-after-write=5m
quarkus.cache.redis.conteudo-buscar-cache.expire-after-write=5m
quarkus.cache.redis.conteudo-filtrar-cache.expire-after-write=5m

# Disable caching for testing profile
%test.quarkus.cache.enabled=false
